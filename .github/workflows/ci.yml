name: CI

on:
  push:
    branches: [main, "cleanup/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      # 测试不需要任何 API key：模型层与数据层都有本地兜底
      - run: npm test

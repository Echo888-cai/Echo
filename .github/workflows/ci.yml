name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: echo_ci
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/echo_ci
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: rustup toolchain install 1.85.0 --profile minimal --component rustfmt,clippy
      - run: npm run lint
      - run: npm run check:retired
      - run: npm run check:frozen
      - run: npm run lint:rust
      - run: npm run typecheck
      - run: npm run migrate --workspace @echo/db
      - run: npm test
      - run: npm run build --workspace @echo/web
      - run: npm run db:recovery-drill
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
